      };

      const center = 205;
      const radius = 192;
      const startAngle = -112.5;
      const sliceAngle = 45;

      const slices = [
        { color: "#ff2d2d", label: ["NAO FOI", "DESSA VEZ"], result: "Nao foi dessa vez" },
        { color: "#ffffff", label: ["FREE", "GRATIS"], result: "Free gratis" },
        { color: "#ff2d2d", label: ["NAO FOI", "DESSA VEZ"], result: "Nao foi dessa vez" },
        { color: "#ffffff", label: ["CUPOM", "30% OFF"], result: "Cupom 30% off", small: true },
        { color: "#ffffff", image: assets.shirt, result: "Camiseta" },
        { color: "#ffffff", label: ["FREE", "GRATIS"], result: "Free gratis" },
        { color: "#ffffff", label: ["CUPOM", "20% OFF"], result: "Cupom 20% off", small: true },
        { color: "#ffffff", image: assets.keychain, result: "Chaveiro" },
      ];

      let spinsLeft = 999;
      let currentRotation = 0;
      let spinning = false;
      let wheelGroup;

      const soundEffects = (() => {
        let context;
        let masterGain;

        function getContext() {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return null;

          if (!context) {
            context = new AudioContext();
            masterGain = context.createGain();
            masterGain.gain.value = 0.32;
            masterGain.connect(context.destination);
          }

          if (context.state === "suspended") context.resume();
          return context;
        }

        function playTone({ frequency, duration, delay = 0, gain = 0.08, type = "square", slideTo = null }) {
          const ctx = getContext();
          if (!ctx) return;

          const now = ctx.currentTime + delay;
          const oscillator = ctx.createOscillator();
          const gainNode = ctx.createGain();
          const end = now + duration;

          oscillator.type = type;
          oscillator.frequency.setValueAtTime(frequency, now);
          if (slideTo) oscillator.frequency.exponentialRampToValueAtTime(slideTo, end);

          gainNode.gain.setValueAtTime(0.0001, now);
          gainNode.gain.exponentialRampToValueAtTime(gain, now + 0.008);
          gainNode.gain.exponentialRampToValueAtTime(0.0001, end);

          oscillator.connect(gainNode);
          gainNode.connect(masterGain);
          oscillator.start(now);
          oscillator.stop(end + 0.02);
        }

        function playClick() {
          playTone({ frequency: 150, slideTo: 75, duration: 0.09, gain: 0.12, type: "triangle" });
          playTone({ frequency: 760, slideTo: 520, duration: 0.04, gain: 0.045, type: "square" });
        }

        function playTick(progress) {
          const pitch = 820 - progress * 260;
          const volume = 0.052 - progress * 0.018;
          playTone({ frequency: pitch, slideTo: pitch * 0.62, duration: 0.035, gain: volume, type: "square" });
        }

        function playResult(result) {
          const lost = result.toLowerCase().includes("nao foi");

          if (lost) {
            playTone({ frequency: 220, slideTo: 145, duration: 0.16, gain: 0.08, type: "triangle" });
            playTone({ frequency: 145, slideTo: 95, delay: 0.14, duration: 0.2, gain: 0.06, type: "triangle" });
            return;
          }

          playTone({ frequency: 523.25, duration: 0.12, gain: 0.07, type: "square" });
          playTone({ frequency: 659.25, delay: 0.11, duration: 0.12, gain: 0.07, type: "square" });
          playTone({ frequency: 783.99, delay: 0.22, duration: 0.18, gain: 0.08, type: "square" });
        }

        return { playClick, playTick, playResult };
      })();

      function createSvgElement(tag, attributes = {}) {
        const node = document.createElementNS(SVG_NS, tag);
        Object.entries(attributes).forEach(([key, value]) => node.setAttribute(key, value));
        return node;
      }

      function polarPoint(angle, distance) {
        const radians = (Math.PI / 180) * angle;
        return {
          x: center + Math.cos(radians) * distance,
          y: center + Math.sin(radians) * distance,
        };
      }

      function sectorPath(fromAngle, toAngle) {
        const start = polarPoint(fromAngle, radius);
        const end = polarPoint(toAngle, radius);
        const largeArc = toAngle - fromAngle > 180 ? 1 : 0;
        return [`M ${center} ${center}`, `L ${start.x.toFixed(2)} ${start.y.toFixed(2)}`, `A ${radius} ${radius} 0 ${largeArc} 1 ${end.x.toFixed(2)} ${end.y.toFixed(2)}`, "Z"].join(" ");
      }

      function readableRotation(angle) {
        let rotation = angle;
        while (rotation < -180) rotation += 360;
        while (rotation > 180) rotation -= 360;
        if (rotation > 92) rotation -= 180;
        if (rotation < -92) rotation += 180;
        return rotation;
      }

      function addLabel(parent, slice, angle, distance) {
        const position = polarPoint(angle, distance);
        const rotation = readableRotation(angle);
        const group = createSvgElement("g", { transform: `translate(${position.x.toFixed(2)} ${position.y.toFixed(2)}) rotate(${rotation.toFixed(2)})` });
        const text = createSvgElement("text", { class: `opbs-wheel-text${slice.small ? " opbs-small" : ""}`, "text-anchor": "middle", "dominant-baseline": "middle" });

        slice.label.forEach((line, index) => {
          const tspan = createSvgElement("tspan", { x: "0", y: String((index - (slice.label.length - 1) / 2) * 20) });
          tspan.textContent = line;
          text.appendChild(tspan);
        });

        group.appendChild(text);
        parent.appendChild(group);
      }

      function addPrizeImage(parent, src, angle, distance, size, extraRotation = 0) {
        const position = polarPoint(angle, distance);
        parent.appendChild(createSvgElement("image", {
          href: src,
          x: (-size / 2).toFixed(2),
          y: (-size / 2).toFixed(2),
          width: String(size),
          height: String(size),
          preserveAspectRatio: "xMidYMid meet",
          transform: `translate(${position.x.toFixed(2)} ${position.y.toFixed(2)}) rotate(${extraRotation})`,
        }));
      }

      function addCenterMascot(parent) {
        parent.appendChild(createSvgElement("image", {
          href: assets.center,
          x: "55",
          y: "55",
          width: "300",
          height: "300",
          preserveAspectRatio: "xMidYMid meet",
        }));
      }

      function buildWheel() {
        wheel.textContent = "";
        wheelGroup = createSvgElement("g", { id: "opbsWheelRotator" });
        wheel.appendChild(wheelGroup);

        slices.forEach((slice, index) => {
          const from = startAngle + index * sliceAngle;
          const to = from + sliceAngle;
          wheelGroup.appendChild(createSvgElement("path", {
            d: sectorPath(from, to),
            fill: slice.color,
            stroke: "#050505",
            "stroke-width": "4.5",
            "stroke-linejoin": "round",
          }));
        });

        wheelGroup.appendChild(createSvgElement("circle", { cx: center, cy: center, r: radius, fill: "none", stroke: "#050505", "stroke-width": "5.5" }));

        slices.forEach((slice, index) => {
          const angle = startAngle + index * sliceAngle + sliceAngle / 2;
          if (slice.label) {
            const textDistance = index === 0 ? 135 : index === 2 ? 128 : 124;
            addLabel(wheelGroup, slice, angle, textDistance);
          }
          if (slice.image === assets.shirt) addPrizeImage(wheelGroup, slice.image, angle, 118, 72);
          if (slice.image === assets.keychain) addPrizeImage(wheelGroup, slice.image, angle, 162, 96, 8);
        });

        addCenterMascot(wheelGroup);
      }

      function easeOutCubic(progress) {
        return 1 - Math.pow(1 - progress, 3);
      }

      function setWheelRotation(rotation) {
        currentRotation = rotation;
        wheelGroup.setAttribute("transform", `rotate(${currentRotation.toFixed(3)} ${center} ${center})`);
      }

      function finishOnSlice(index) {
        const sliceCenter = startAngle + index * sliceAngle + sliceAngle / 2;
        const desiredRotation = -90 - sliceCenter;
        const normalizedCurrent = ((currentRotation % 360) + 360) % 360;
        const delta = ((desiredRotation - normalizedCurrent) % 360 + 360) % 360;
        return currentRotation + 360 * 6 + delta;
      }

      function spin() {
        if (spinning || spinsLeft <= 0) return;

        spinning = true;
        spinsLeft -= 1;
        spinsLeftNode.textContent = String(spinsLeft);
        spinButton.disabled = true;

        const targetIndex = Math.floor(Math.random() * slices.length);
        const start = currentRotation;
        const target = finishOnSlice(targetIndex);
        const duration = 4300;
        const startedAt = performance.now();
        let lastTickStep = Math.floor(start / sliceAngle);
        let lastTickAt = startedAt;

        soundEffects.playClick();

        function tick(now) {
          const progress = Math.min((now - startedAt) / duration, 1);
          const eased = easeOutCubic(progress);
          const rotation = start + (target - start) * eased;
          const tickStep = Math.floor(rotation / sliceAngle);

          setWheelRotation(rotation);

          if (tickStep !== lastTickStep && now - lastTickAt > 34) {
            soundEffects.playTick(progress);
            lastTickStep = tickStep;
            lastTickAt = now;
          }

          if (progress < 1) {
            requestAnimationFrame(tick);
            return;
          }

          spinning = false;
          spinButton.disabled = false;
          statusNode.textContent = `Resultado: ${slices[targetIndex].result}.`;
          soundEffects.playResult(slices[targetIndex].result);
        }

        requestAnimationFrame(tick);
      }

      buildWheel();
      setWheelRotation(0);
      spinButton.addEventListener("click", spin);
    })();
  </script>
